    :root {

      --green: #00dc6e; --yellow: #f5c842; --red: #f54262;
      --border: rgba(255,255,255,0.07); --border-2: rgba(255,255,255,0.13);
      --text: #e8eaed; --dim: rgba(232,234,237,0.45); --dimmer: rgba(232,234,237,0.22);
      --mono: 'IBM Plex Mono', monospace; --sans: 'Syne', sans-serif;
    }
    html { font-size: 14px; }
    body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; }
    #root { max-width: 1120px; margin: 0 auto; padding: 28px 16px 80px; }

    .hdr { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 14px; margin-bottom: 22px; }
    .hdr-title { font-family: var(--sans); font-size: 1.65rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1.1; }
    .hdr-title span { color: var(--green); }
    .hdr-sub { font-size: 0.7rem; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 5px; }
    .hdr-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .timestamp { font-size: 0.7rem; color: var(--dim); text-align: right; }
    .countdown { font-size: 0.68rem; color: var(--dimmer); }
    .btn-refresh { background: transparent; border: 1px solid var(--green); color: var(--green); font-family: var(--mono); font-size: 0.75rem; padding: 7px 16px; cursor: pointer; border-radius: 4px; letter-spacing: 0.06em; transition: all 0.15s; }
    .btn-refresh:hover:not(:disabled) { background: var(--green); color: #000; }
    .btn-refresh:disabled { opacity: 0.35; cursor: not-allowed; }

    .platform-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
    .plat-badge { display: flex; align-items: center; gap: 7px; font-size: 0.7rem; padding: 4px 11px; border-radius: 4px; background: var(--surface-2); border: 1px solid var(--border); letter-spacing: 0.04em; }
    .plat-name { font-weight: 600; }
    .plat-count { color: var(--dim); }
    .plat-err { color: var(--red); font-size: 0.65rem; }
    .plat-load { color: var(--yellow); font-size: 0.65rem; }
    .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .dot-ok { background: var(--green); }
    .dot-err { background: var(--red); }
    .dot-load { background: var(--yellow); animation: blink 1s ease infinite; }
    .dot-idle { background: var(--dimmer); }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.25} }

    .err-banner { background: rgba(245,66,98,0.06); border: 1px solid rgba(245,66,98,0.2); border-radius: 6px; padding: 9px 14px; font-size: 0.7rem; color: rgba(245,66,98,0.85); margin-bottom: 10px; }

    .stats-bar { display: flex; margin-bottom: 18px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .stat { flex: 1; padding: 14px 18px; display: flex; flex-direction: column; gap: 3px; border-right: 1px solid var(--border); }
    .stat:last-child { border-right: none; }
    .stat-val { font-size: 1.25rem; font-weight: 600; }
    .stat-lbl { font-size: 0.62rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.1em; }

    .filters { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
    .fbtn { background: var(--surface); border: 1px solid var(--border); color: var(--dim); font-family: var(--mono); font-size: 0.7rem; padding: 5px 13px; cursor: pointer; border-radius: 4px; letter-spacing: 0.05em; transition: all 0.15s; }
    .fbtn:hover { border-color: var(--border-2); color: var(--text); }
    .fbtn.active { border-color: var(--green); color: var(--green); background: rgba(0,220,110,0.06); }
    .near-toggle { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: 0.7rem; color: var(--dim); cursor: pointer; user-select: none; }
    .tswitch { width: 32px; height: 18px; border-radius: 9px; background: var(--surface-2); border: 1px solid var(--border-2); position: relative; transition: all 0.2s; flex-shrink: 0; }
    .tswitch.on { background: rgba(0,220,110,0.15); border-color: var(--green); }
    .tknob { position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; border-radius: 50%; background: var(--dim); transition: all 0.2s; }
    .tswitch.on .tknob { left: 16px; background: var(--green); }

    .sec-hdr { display: flex; align-items: center; gap: 10px; font-family: var(--sans); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--dim); margin-bottom: 12px; }
    .sec-hdr::after { content:''; flex:1; height:1px; background: var(--border); }
    .sec-count { color: var(--green); font-family: var(--mono); font-size: 0.8rem; }

    /* Cards */

    .card { background: var(--surface); border-radius: 10px; padding: 16px 18px; border: 1px solid var(--border); border-left: 3px solid transparent; }
    .card.strong { border-left-color: var(--green); }
    .card.decent { border-left-color: var(--yellow); }
    .card.thin   { border-left-color: rgba(255,255,255,0.22); }
    .card.near   { border-left-color: rgba(255,255,255,0.1); }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 9px; }
    .card-tags { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .cat-tag { font-size: 0.6rem; padding: 2px 7px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; background: var(--surface-2); border: 1px solid var(--border-2); color: var(--dim); }
    .type-tag { font-size: 0.6rem; padding: 2px 7px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.25); color: #a5b4fc; }
    .roi-tag { font-size: 0.62rem; padding: 2px 7px; border-radius: 3px; background: rgba(0,220,110,0.08); border: 1px solid rgba(0,220,110,0.18); color: var(--green); }
    .margin-grp { display: flex; align-items: center; gap: 7px; white-space: nowrap; }
    .margin-val { font-size: 1.05rem; font-weight: 700; }

    .card-title { font-family: var(--sans); font-size: 0.92rem; font-weight: 600; margin-bottom: 14px; line-height: 1.35; }

    /* OddsJam legs */
    .oj-legs { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: stretch; margin-bottom: 14px; }
    .oj-vs { font-size: 0.65rem; color: var(--dimmer); font-weight: 700; display: flex; align-items: center; justify-content: center; }
    .oj-leg { background: var(--surface-2); border-radius: 8px; padding: 12px 14px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 3px; }
    .oj-plat { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; margin-bottom: 4px; }
    .oj-bet-dir { font-size: 0.68rem; color: var(--dim); margin-bottom: 2px; }
    .oj-bet-dir strong { color: var(--green); font-size: 0.75rem; }
    .oj-raw-title { font-size: 0.72rem; color: var(--text); margin-bottom: 6px; line-height: 1.3; }
    .oj-odds { display: flex; align-items: baseline; gap: 8px; margin: 4px 0 3px; flex-wrap: wrap; }
    .oj-american { font-size: 1.2rem; font-weight: 700; color: var(--text); }
    .oj-decimal { font-size: 0.78rem; color: var(--yellow); font-weight: 600; }
    .oj-cents { font-size: 0.68rem; color: var(--dim); }
    .oj-stake-line { font-size: 0.72rem; margin-top: 4px; }
    .oj-stake-val { font-weight: 600; color: var(--green); }
    .oj-stake-lbl { color: var(--dim); }
    .card-date { font-size: 0.65rem; color: var(--dim); font-family: var(--mono); margin-left: 10px; font-weight: 400; }

    /* Calculator */
    .oj-calc { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; padding: 12px 0 2px; border-top: 1px solid var(--border); }
    .oj-calc-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .oj-calc-lbl { font-size: 0.68rem; color: var(--dim); white-space: nowrap; }
    .stake-input-wrap { display: flex; align-items: center; gap: 4px; background: var(--surface-2); border: 1px solid var(--green); border-radius: 5px; padding: 4px 10px; }
    .stake-dollar { color: var(--green); font-size: 0.8rem; }

    .oj-calc-right { text-align: right; }
    .oj-profit-val { font-size: 1.3rem; font-weight: 700; color: var(--green); }
    .oj-profit-lbl { font-size: 0.65rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em; }
    .oj-return-lbl { font-size: 0.65rem; color: var(--dimmer); margin-top: 3px; }
    .oj-not-yet { font-size: 0.72rem; color: var(--dim); }

    /* Platform colors */
    .pm-c { color: #818cf8; } .ka-c { color: #22d3ee; } .nv-c { color: #4ade80; }

    /* OddsJam stake improvements */
    .oj-leg-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
    .oj-leg-label { font-size:0.6rem; color:var(--dimmer); text-transform:uppercase; letter-spacing:0.1em; }
    .oj-action { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
    .oj-bet-word { font-size:0.75rem; color:var(--dim); }
    .oj-what-bet { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
    .oj-outcome-desc { font-size:0.8rem; font-weight:600; color:var(--text); }
    .oj-outcome-badge { font-size:0.75rem; font-weight:800; padding:2px 10px; border-radius:4px; letter-spacing:0.05em; }
    .yes-badge { background:rgba(0,220,110,0.15); color:var(--green); border:1px solid rgba(0,220,110,0.3); }
    .no-badge  { background:rgba(245,66,98,0.15);  color:var(--red);   border:1px solid rgba(245,66,98,0.3); }
    .oj-stake-wrap { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:8px; }
    .oj-stake-label { font-size:0.65rem; color:var(--dim); }
    .oj-payout-line { font-size:0.7rem; color:var(--dim); }
    .oj-payout-line strong { color:var(--green); }
    .oj-quick-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; padding:10px 0 6px; border-top:1px solid var(--border); margin-top:4px; }
    .oj-scenarios { background:var(--surface-2); border-radius:8px; padding:12px 14px; margin-top:10px; display:flex; flex-direction:column; gap:6px; }
    .oj-scenario { display:flex; align-items:center; justify-content:space-between; font-size:0.75rem; }
    .oj-scen-lbl { color:var(--dim); }
    .oj-scen-profit { color:var(--green); font-weight:700; font-size:0.85rem; }
    .oj-scen-loss   { color:var(--red);   font-weight:700; font-size:0.85rem; }
    .oj-guaranteed { font-size:0.75rem; color:var(--green); border-top:1px solid var(--border); padding-top:8px; margin-top:2px; }
    .oj-guaranteed strong { font-size:0.9rem; }
    .oj-unbalanced { font-size:0.68rem; color:var(--yellow); }

        .near-section {
     margin-top: 24px; }
    .near-hdr-btn { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.7rem; color: var(--dim); padding: 8px 0; user-select: none; transition: color 0.15s; background: none; border: none; font-family: var(--mono); }
    .near-hdr-btn:hover { color: var(--text); }
    .chev { font-size: 0.62rem; transition: transform 0.2s; display: inline-block; }
    .chev.open { transform: rotate(90deg); }

    .empty { text-align: center; padding: 52px 20px; color: var(--dim); font-size: 0.78rem; line-height: 2; }

    .skel { background: linear-gradient(90deg, var(--surface) 25%, var(--surface-2) 50%, var(--surface) 75%); background-size: 200% 100%; animation: shim 1.6s infinite; border-radius: 10px; }
    @keyframes shim { 0%{background-position:200% 0}100%{background-position:-200% 0} }
    .skel-card { height: 160px; margin-bottom: 10px; }

    @media(max-width:600px) {
      .oj-legs { grid-template-columns: 1fr; }
      .oj-vs { display: none; }
      .hdr { flex-direction: column; }
      .near-toggle { margin-left: 0; }
      .stats-bar { flex-wrap: wrap; }
      .stat { min-width: 100px; }
    }
  </style>
</head>

function extractKalshiFavoredTeam(title) {
  // "Oklahoma City wins by over 9.5 points?" → 'okc'
  // "Los Angeles L wins by over 7.5 points?" → 'lal'
  const m = (title||'').match(/^(.+?)\s+wins by over/i);
  if (!m) return null;
  return KALSHI_TEAM_NAMES[m[1].trim().toLowerCase()] || null;
}

function extractPMFavoredTeam(title) {
  // "Spread: Thunder (-9.5)" → 'okc'
  // "Spread: Rockets (-8.5)" → 'hou'
  const m = (title||'').match(/Spread:\s+(.+?)\s+\(/i);
  if (!m) return null;
  return KALSHI_TEAM_NAMES[m[1].trim().toLowerCase()] || null;
}


function normalizeTeam(name) {
  if (!name) return null;
  const t = name.toLowerCase().trim();
  return TEAM_MAP[t] || t;
}

function teamsFromKalshiTicker(ticker) {
  // KXNBAGAME-26APR25DETORL-ORL  →  teams: [DET, ORL]
  // KXNBASPREAD-26APR25DETORL-ORL7 → same
  const parts = ticker.split('-');
  if (parts.length < 2) return [];
  const gamePart = parts[1]; // e.g. 26APR25DETORL
  // Strip the date prefix (digits + month + digits = 9 chars like 26APR25)
  const dateStripped = gamePart.replace(/^\d{2}[A-Z]{3}\d{2}/, '');
  // dateStripped = DETORL → split into 3-char codes
  const teams = [];
  for (let i = 0; i < dateStripped.length; i += 3) {
    const code = dateStripped.slice(i, i + 3);
    if (code.length === 3) teams.push(KALSHI_CODES[code] || code.toLowerCase());
  }
  return teams;
}

function dateFromKalshiTicker(ticker) {
  // 26APR25 → 2026-04-25
  const m = ticker.match(/(\d{2})([A-Z]{3})(\d{2})/);
  if (!m) return null;
  const months = {JAN:'01',FEB:'02',MAR:'03',APR:'04',MAY:'05',JUN:'06',
                  JUL:'07',AUG:'08',SEP:'09',OCT:'10',NOV:'11',DEC:'12'};
  return `20${m[1]}-${months[m[2]] || '01'}-${m[3].padStart(2,'0')}`;
}

function lineFromKalshiTicker(ticker) {
  // Last segment: ORL7 → 7, 228 → 228, OKC-3 → -3
  const parts = ticker.split('-');
  const last = parts[parts.length - 1];
  const m = last.match(/(-?\d+\.?\d*)$/);
  return m ? parseFloat(m[1]) : null;
}

function sportFromSeries(series) {
  if (/^KXNBA/.test(series) || /^KXWNBA/.test(series)) return 'nba';
  if (/^KXMLB/.test(series) || /^KXNRFI/.test(series)) return 'mlb';
  if (/^KXNFL/.test(series)) return 'nfl';
  if (/^KXNHL/.test(series)) return 'nhl';
  if (/KXBTC|KXETH|KXSOL/.test(series)) return 'crypto';
  return 'other';
}

function marketTypeFromSeries(series) {
  if (/GAME/.test(series)) return 'moneyline';
  if (/SPREAD/.test(series)) return 'spread';
  if (/TOTAL/.test(series)) return 'total';
  if (/PTS|POINTS/.test(series)) return 'prop';
  if (/REB/.test(series)) return 'prop';
  if (/AST/.test(series)) return 'prop';
  if (/3PT/.test(series)) return 'prop';
  if (/HIT|HR|RBI|PITCH/.test(series)) return 'prop';
  if (/NRFI/.test(series)) return 'prop';
  return 'other';
}

// ─── STAT TYPE DETECTION ─────────────────────────────────────────────────────
function extractStatType(title) {
  const t = title.toLowerCase();
  if (/\bpoints?\b|\bpts\b/.test(t)) return 'points';
  if (/\brebounds?\b|\brebs?\b/.test(t)) return 'rebounds';
  if (/\bassists?\b|\bast\b/.test(t)) return 'assists';
  if (/\bthrees?\b|3-point|3pt/.test(t)) return 'threes';
  if (/\bsteals?\b/.test(t)) return 'steals';
  if (/\bblocks?\b|\bblk/.test(t)) return 'blocks';
  if (/\bhits?\b/.test(t)) return 'hits';
  if (/\bstrike.?outs?\b/.test(t)) return 'strikeouts';
  if (/\bhome.?runs?\b/.test(t)) return 'homeruns';
  if (/\bgoals?\b/.test(t)) return 'goals';
  return null;
}

function extractPlayer(title) {
  // "Shai Gilgeous-Alexander: 30+ points" → "shai gilgeous-alexander"
  // "Devin Booker: Assists O/U 5.5" → "devin booker"
  const colonIdx = title.indexOf(':');
  if (colonIdx > 0) return title.slice(0, colonIdx).toLowerCase().trim();
  return null;
}

function playerMatch(a, b) {
  if (!a || !b) return false;
  if (a === b) return true;
  const tokA = a.split(/\s+/);
  const tokB = b.split(/\s+/);
  // Last names must match exactly AND be >4 chars (filters out "James" as first name)
  const lastA = tokA[tokA.length - 1];
  const lastB = tokB[tokB.length - 1];
  if (lastA.length <= 4 || lastB.length <= 4) return false; // too short = ambiguous
  if (lastA !== lastB) return false; // last names must match
  // Also require first name initial to match (prevents false positives on shared last names)
  const firstA = tokA[0] ? tokA[0][0].toLowerCase() : '';
  const firstB = tokB[0] ? tokB[0][0].toLowerCase() : '';
  return firstA === firstB;
}

// ─── GAME KEY ────────────────────────────────────────────────────────────────
// gameKey = Polymarket event slug = "nba-okc-phx-2026-04-25"
// Both platforms must produce the same gameKey for a match.

const KA_MONTHS = {JAN:'01',FEB:'02',MAR:'03',APR:'04',MAY:'05',JUN:'06',
                   JUL:'07',AUG:'08',SEP:'09',OCT:'10',NOV:'11',DEC:'12'};

const KA_TO_PM = {
  ATL:'atl',BOS:'bos',BKN:'bkn',CHA:'cha',CHI:'chi',CLE:'cle',DAL:'dal',
  DEN:'den',DET:'det',GSW:'gsw',HOU:'hou',IND:'ind',LAC:'lac',LAL:'lal',
  MEM:'mem',MIA:'mia',MIL:'mil',MIN:'min',NOP:'nop',NYK:'nyk',OKC:'okc',
  ORL:'orl',PHI:'phi',PHX:'phx',POR:'por',SAC:'sac',SAS:'sas',TOR:'tor',
  UTA:'uta',WAS:'was',
  // MLB
  ARI:'ari',ATH:'oak',BAL:'bal',CHC:'chc',CIN:'cin',COL:'col',CWS:'cws',
  KC:'kc',KCR:'kc',LAA:'laa',LAD:'lad',NYM:'nym',NYY:'nyy',OAK:'oak',
  PHI:'phi',PIT:'pit',SDP:'sd',SEA:'sea',SFG:'sf',STL:'stl',TBR:'tb',
  TEX:'tex',WSH:'wsh',MIL:'mil',MIN:'min',DET:'det',HOU:'hou',MIA:'mia',
};

function gameKeyFromKalshiTicker(ticker) {
  const parts  = ticker.split('-');
  const middle = parts[1] || '';
  const dateM  = middle.match(/(\d{2})([A-Z]{3})(\d{2})/);
  if (!dateM) return null;
  const year = '20' + dateM[1];
  const mon  = KA_MONTHS[dateM[2]] || '01';
  const day  = dateM[3].padStart(2, '0');
  // MLB tickers embed game time before team codes (e.g. 1305SFPHI)
  // NBA/NHL tickers go straight to teams (e.g. OKCPHX)
  const rest = middle.slice(dateM.index + dateM[0].length);
  const teamStr = rest.replace(/^\d+/, ''); // strip game time digits
  let sport = 'other';
  if (/KXNBA/.test(ticker)) sport = 'nba';
  else if (/KXMLB/.test(ticker)) sport = 'mlb';
  else if (/KXNFL/.test(ticker)) sport = 'nfl';
  else if (/KXNHL/.test(ticker)) sport = 'nhl';
  // Try 2+rest or 3+rest split for team codes
  let away = null, home = null;
  for (const aLen of [2, 3]) {
    const aC = teamStr.slice(0, aLen);
    const hC = teamStr.slice(aLen);
    if (hC.length >= 2 && KA_TO_PM[aC] && KA_TO_PM[hC]) {
      away = KA_TO_PM[aC]; home = KA_TO_PM[hC]; break;
    }
  }
  if (!away) away = KA_TO_PM[teamStr.slice(0,3)] || teamStr.slice(0,3).toLowerCase();
  if (!home) home = KA_TO_PM[teamStr.slice(3,6)] || teamStr.slice(3,6).toLowerCase();
  return `${sport}-${away}-${home}-${year}-${mon}-${day}`;
}

// ─── POLYMARKET NORMALIZER ────────────────────────────────────────────────────
function extractPolymarketStructure(m) {
  const title = m.question || m.title || '';
  const slug  = m.eventSlug || m.slug || '';

  // Skip first-half markets entirely
  if (/\b1H\b/.test(title)) return null;

  // gameKey IS the event slug
  const gameKey = slug;
  if (!gameKey) return null;

  // Sport from slug prefix
  let sport = 'other';
  if (gameKey.startsWith('nba-')) sport = 'nba';
  else if (gameKey.startsWith('mlb-')) sport = 'mlb';
  else if (gameKey.startsWith('nfl-')) sport = 'nfl';
  else if (gameKey.startsWith('nhl-')) sport = 'nhl';

  // Use endDateIso — confirmed accurate by debug (endDateIso=2026-04-25 for Apr 25 game)
  // Slug date can be off by one (created in US timezone before UTC game date)
  const gameDate = (m.endDateIso || m.end || gameKey.match(/(\d{4}-\d{2}-\d{2})$/)?.[1] || null);

  // Market type + line + prop fields
  let marketType = 'moneyline';
  let line = null;
  let player = null;
  let statType = null;

  const t = title.toLowerCase();

  if (/finals|championship|stanley cup|world series|super bowl/i.test(t)) {
    marketType = 'championship';
  } else if (/\bO\/U\s*([\d.]+)/i.test(title)) {
    // Has O/U — could be game total or player prop
    const ouM = title.match(/O\/U\s*([\d.]+)/i);
    line = ouM ? parseFloat(ouM[1]) : null;
    const colonIdx = title.indexOf(':');
    if (colonIdx > 0 && colonIdx < 30) {
      // "Player: Stat O/U N" format → prop
      marketType = 'prop';
      player   = extractPlayer(title);
      statType = extractStatType(title);
    } else {
      // Game total: line > 50 for sports
      marketType = line && line > 50 ? 'total' : 'prop';
    }
  } else if (/\bspread\b/i.test(title) || /\([+-]?[\d.]+\)/.test(title)) {
    marketType = 'spread';
    const spM = title.match(/\([-+]?([\d.]+)\)/);
    line = spM ? parseFloat(spM[1]) : null;
  } else {
    // Check if it's a player prop without O/U (e.g. "Player: N+ stat")
    const colonIdx = title.indexOf(':');
    if (colonIdx > 0 && /\d+\+/.test(title)) {
      marketType = 'prop';
      player   = extractPlayer(title);
      statType = extractStatType(title);
      const lineM = title.match(/([\d.]+)\+/);
      line = lineM ? parseFloat(lineM[1]) : null;
    }
    // else: plain "Team vs Team" = moneyline, no changes needed
  }

  // Teams from slug: nba-okc-phx-2026-04-25 → ['okc','phx']
  const slugParts = gameKey.split('-');
  const dateIdx = slugParts.findIndex(p => /^20\d{2}$/.test(p));
  const teams = dateIdx >= 2 ? slugParts.slice(1, dateIdx) : [];

  // Use depth-adjusted orderbook prices (confirmed accurate vs top-of-book)
  // clobYesBuy = weighted avg fill price for $50 bet on YES side
  // clobNoBuy  = weighted avg fill price for $50 bet on NO side (derived from YES bids)
  const clobYes = parseFloat(m.clobYesBuy || 0);
  const clobNo  = parseFloat(m.clobNoBuy  || 0);
  const bestAsk = parseFloat(m.bestAsk || 0);
  const bestBid = parseFloat(m.bestBid || 0);
  const fallback = m.outcomePrices
    ? (Array.isArray(m.outcomePrices) ? m.outcomePrices : JSON.parse(m.outcomePrices || '[]'))
    : [];

  const yesPrice = clobYes > 0.01 ? clobYes
                 : bestAsk > 0.01 ? bestAsk
                 : parseFloat(fallback[0] || 0);

  const noPrice  = clobNo  > 0.01 ? clobNo
                 : bestBid > 0.01 ? (1 - bestBid)
                 : parseFloat(fallback[1] || 0);

  if (!yesPrice || yesPrice < 0.02 || yesPrice > 0.98) return null;
  // Reject markets where $50 is not fully fillable (too illiquid to arb)
  if (m.clobYesBuy && !m.yesFullyFillable) return null;
  // Reject wide spread (illiquid)
  if (yesPrice > 0 && noPrice > 0 && (yesPrice + noPrice) > 1.15) return null;

  return {
    id: 'pm_' + (m.id || m.conditionId || gameKey + Math.random()),
    platform: 'polymarket',
    rawTitle: title,
    sport, gameKey, teams, marketType, line, player, statType, gameDate,
    yesPrice, noPrice,
    url: gameKey ? `https://polymarket.com/sports/${sport}/${gameKey}` : 'https://polymarket.com',
  };
}

// ─── KALSHI NORMALIZER ────────────────────────────────────────────────────────
function extractKalshiStructure(m) {
  const ticker = m.ticker || '';
  const title  = m.title  || '';
  const series = ticker.split('-')[0] || '';

  // Detect futures ticker format KXNBA-26-OKC
  const isFutures = /^KX(NBA|MLB|NFL|NHL|WNBA)-\d{2}-/.test(ticker);

  let sport = 'other';
  if (/^KXNBA/.test(series) || /^KXWNBA/.test(series)) sport = 'nba';
  else if (/^KXMLB/.test(series) || /^KXNRFI/.test(series)) sport = 'mlb';
  else if (/^KXNFL/.test(series)) sport = 'nfl';
  else if (/^KXNHL/.test(series)) sport = 'nhl';
  else if (/KXBTC|KXETH/.test(series)) sport = 'crypto';

  let marketType, line, player, statType, gameKey, teams, gameDate, winnerTeam = null;

  if (isFutures) {
    marketType = 'championship';
    const teamCode = ticker.split('-').pop();
    const teamName = KALSHI_CODES[teamCode] || teamCode.toLowerCase();
    teams = [teamName]; gameKey = null; line = null; player = null; statType = null; gameDate = null;
  } else {
    // Derive gameKey from ticker
    gameKey = gameKeyFromKalshiTicker(ticker);
    if (!gameKey) return null;

    // Market type from series prefix
    if (/GAME/.test(series)) {
      marketType = 'moneyline';
      // Extract which team this market is "for" from ticker suffix
      // KXNBAGAME-26APR25OKCPHX-OKC → winnerCode='OKC' → winnerTeam='okc'
      const suffix = ticker.split('-').pop();
      winnerTeam = KA_TO_PM[suffix] || suffix.toLowerCase();
    }
    else if (/SPREAD/.test(series)) marketType = 'spread';
    else if (/TOTAL/.test(series)) marketType = 'total';
    else if (/PTS/.test(series)) { marketType = 'prop'; statType = 'points'; }
    else if (/REB/.test(series)) { marketType = 'prop'; statType = 'rebounds'; }
    else if (/AST/.test(series)) { marketType = 'prop'; statType = 'assists'; }
    else if (/3PT/.test(series)) { marketType = 'prop'; statType = 'threes'; }
    else if (/STL/.test(series)) { marketType = 'prop'; statType = 'steals'; }
    else if (/BLK/.test(series)) { marketType = 'prop'; statType = 'blocks'; }
    else if (/HIT/.test(series)) { marketType = 'prop'; statType = 'hits'; }
    else if (/HR/.test(series))  { marketType = 'prop'; statType = 'homeruns'; }
    else if (/PITCH/.test(series)) { marketType = 'prop'; statType = 'strikeouts'; }
    else marketType = 'other';

    // Extract line from title
    if (marketType === 'spread' || marketType === 'total') {
      const overM = title.match(/over\s+([\d.]+)/i);
      const ouM   = title.match(/O\/U\s*([\d.]+)/i);
      const tkNum = ticker.split('-').pop().match(/([\d.]+)$/);
      line = overM ? parseFloat(overM[1]) : ouM ? parseFloat(ouM[1]) : tkNum ? parseFloat(tkNum[1]) : null;
    } else if (marketType === 'prop') {
      // "Shai Gilgeous-Alexander: 30+ points"
      player = extractPlayer(title);
      if (!statType) statType = extractStatType(title);
      const lineM = title.match(/([\d.]+)\+/);
      // Kalshi "N+" means ≥N. Polymarket "O/U N.5" means >N.5 = ≥N+1 for integers.
      // So Kalshi 7+ (≥7) matches Polymarket O/U 6.5 (>6.5).
      // Normalize: subtract 0.5 so Kalshi 7+ stores as 6.5, matching PM O/U 6.5.
      line = lineM ? parseFloat(lineM[1]) - 0.5 : null;
    } else {
      line = null;
    }

    // Teams from gameKey
    const gkParts = gameKey.split('-');
    const dIdx = gkParts.findIndex(p => /^20\d{2}$/.test(p));
    teams = dIdx >= 2 ? gkParts.slice(1, dIdx) : [];
    const dateM2 = gameKey.match(/(\d{4}-\d{2}-\d{2})$/);
    gameDate = dateM2 ? dateM2[1] : null;
  }

  const yAsk = parseFloat(m.yes_ask_dollars) || 0;
  const yBid = parseFloat(m.yes_bid_dollars) || 0;
  const nAsk = parseFloat(m.no_ask_dollars)  || 0;
  const nBid = parseFloat(m.no_bid_dollars)  || 0;
  const yesRaw = yAsk > 0 ? yAsk : yBid;
  const noRaw  = nAsk > 0 ? nAsk : nBid;
  if (!yesRaw || yesRaw < 0.02 || yesRaw > 0.98) return null;
  // Confirmed from live testing: Kalshi game markets (moneyline/spread/total)
  // always have executable NO. Player props frequently do NOT have NO available
  // despite returning a no_ask price. Filter out all props until we have
  // a reliable way to confirm NO executability on props.
  if (marketType === 'prop') return null;
  // Liquidity check for game markets
  if (nAsk <= 0.01 || nAsk >= 0.99) return null;
  if (yAsk + nAsk < 0.88 || yAsk + nAsk > 1.05) return null;
  // Apply Kalshi quadratic fee: fee = 0.07 * p * (1-p)
  // Confirmed by debug: fee_type=quadratic_with_maker_fees, base_rate≈7%
  // At p=0.47: fee=0.0174, true_cost=0.4874, matches Kalshi's shown 18.53 contracts on $9.04
  // Apply confirmed Kalshi quadratic fee: fee = 0.07 * p * (1-p)
  // Verified: at 53c YES, fee=1.74c, true_cost=54.74c (matches Kalshi's actual payout)
  const kFee = (p) => 0.07 * p * (1 - p);
  const yesFinal = yesRaw + kFee(yesRaw);
  const noFinal  = noRaw  + kFee(noRaw);

  return {
    id: 'ka_' + ticker,
    platform: 'kalshi',
    rawTitle: title,
    sport, gameKey, teams: teams || [], marketType, line,
    player, statType, gameDate: gameDate || null, isFutures: !!isFutures, winnerTeam,
    yesPrice: yesFinal, noPrice: noFinal || (1 - yesFinal),
    url: `https://kalshi.com/markets/${ticker}`,
  };
}

// ─── MATCHING ENGINE ──────────────────────────────────────────────────────────
function matchMarkets(structured) {
  const platforms = [...new Set(structured.map(m => m.platform))];
  if (platforms.length < 2) return [];

  const byPlatform = {};
  platforms.forEach(p => { byPlatform[p] = structured.filter(m => m.platform === p); });

  const pairs = [];
  const seen  = new Set();

  for (let i = 0; i < platforms.length; i++) {
    for (let j = i + 1; j < platforms.length; j++) {
      const pA = platforms[i], pB = platforms[j];
      byPlatform[pA].forEach(mA => {
        byPlatform[pB].forEach(mB => {

          // RULE 1: Same sport, no unknowns
          if (mA.sport !== mB.sport || mA.sport === 'other') return;

          // RULE 2: Exact same gameKey (same game, same date, same teams)
          if (!mA.gameKey || !mB.gameKey) return;
          if (mA.gameKey !== mB.gameKey) return;

          // RULE 3: Exact same marketType
          if (mA.marketType !== mB.marketType) return;
          if (mA.marketType === 'other') return;

          // RULE 3b: For moneylines, only pair Kalshi's AWAY team market with Polymarket
          // Kalshi has 2 markets per game (one per team). Polymarket YES = away team wins.
          // We only pair the Kalshi market where winnerTeam = away team.
          // This prevents fake arbs from pairing PM with the wrong team's Kalshi market.
          if (mA.marketType === 'moneyline') {
            const ka = mA.platform === 'kalshi' ? mA : mB;
            const gkParts = (ka.gameKey || '').split('-');
            const dIdx = gkParts.findIndex(p => /^20\d{2}$/.test(p));
            const awayTeam = dIdx >= 2 ? gkParts[1] : null;
            if (ka.winnerTeam && awayTeam && ka.winnerTeam !== awayTeam) return;
          }

          // RULE 4: For spreads — lines must match within 0.5 AND
          //         both markets must reference the SAME team covering
          if (mA.marketType === 'spread') {
            if (mA.line === null || mB.line === null) return;
            if (Math.abs(mA.line - mB.line) > 0.5) return;
            // Extract favored team from both titles using confirmed lookup
            const favA = mA.platform === 'kalshi'
              ? extractKalshiFavoredTeam(mA.rawTitle)
              : extractPMFavoredTeam(mA.rawTitle);
            const favB = mB.platform === 'kalshi'
              ? extractKalshiFavoredTeam(mB.rawTitle)
              : extractPMFavoredTeam(mB.rawTitle);
            // Both must resolve to same abbreviation — if either is null, skip
            if (!favA || !favB) return;
            if (favA !== favB) return;
          }

          // RULE 5: For totals — lines must match within 1.0
          if (mA.marketType === 'total') {
            if (mA.line === null || mB.line === null) return;
            if (Math.abs(mA.line - mB.line) > 1.0) return;
          }

          // RULE 6: For props — player name AND stat type must match
          if (mA.marketType === 'prop') {
            if (!mA.statType || !mB.statType) return;
            if (mA.statType !== mB.statType) return;
            if (!playerMatch(mA.player, mB.player)) return;
            if (mA.line === null || mB.line === null) return;
            // Tolerance 0.25: after Kalshi N+ → N-0.5 normalization,
            // exact matches differ by 0.0, wrong matches differ by 0.5+
            if (Math.abs(mA.line - mB.line) > 0.25) return;
          }

          const key = [mA.id, mB.id].sort().join('||');
          if (seen.has(key)) return;
          seen.add(key);
          pairs.push([mA, mB]);
        });
      });
    }
  }
  return pairs;
}

// Returns which team is favored in a spread market (the one with negative spread)
function spreadFavoredTeam(m) {
  const t = (m.rawTitle || '').toLowerCase();
  // Polymarket: "Spread: Pistons (-2.5)" → favored = "pistons"
  // Kalshi: "Orlando wins by over 1.5 points?" → favored = "orlando" (they need to WIN BY)
  // Try to extract team name before the spread notation
  const gkParts = (m.gameKey || '').split('-');
  const dateIdx = gkParts.findIndex(p => /^20\d{2}$/.test(p));
  const teams = dateIdx >= 2 ? gkParts.slice(1, dateIdx) : []; // e.g. ['det', 'orl']
  // Check which team appears in the title
  for (const team of teams) {
    if (t.includes(PM_ABBR[team] || team)) return team;
    // Also check via KALSHI_CODES expanded names
    const full = PM_ABBR[team] || '';
    if (full && t.includes(full)) return team;
  }
  return null;
}





// ─── ARB CALCULATION ──────────────────────────────────────────────────────────
const NEAR_ARB_BAND = 0.02;

function calcArb(mA, mB) {
  const combos = [
    { oA:'YES', oB:'NO',  pA: mA.yesPrice, pB: mB.noPrice  },
    { oA:'NO',  oB:'YES', pA: mA.noPrice,  pB: mB.yesPrice },
  ];
  let best = null;
  combos.forEach(c => {
    if (!c.pA || !c.pB) return;
    const sum = c.pA + c.pB;
    if (!best || sum < best.sum) best = { ...c, sum };
  });
  if (!best) return null;

  // Sanity: sum must be between 0.82 and 1.18 to be a real same-market pair
  if (best.sum < 0.90 || best.sum > 1.18) return null;
  // Both legs must have liquidity
  if (best.pA < 0.04 || best.pB < 0.04) return null;

  const margin = (1 - best.sum) * 100;
  const isArb  = margin > 0;
  const isNear = !isArb && margin > -(NEAR_ARB_BAND * 100);
  if (!isArb && !isNear) return null;

  const denom  = best.pA + best.pB;
  const stakeA = BASE_STAKE * best.pA / denom;
  const stakeB = BASE_STAKE * best.pB / denom;
  const profit = isArb ? BASE_STAKE * (1 / denom - 1) : 0;
  const roi    = isArb ? (1 / denom - 1) * 100 : 0;

  // Build display title
  const ABBR = {okc:'OKC',phx:'PHX',den:'DEN',min:'MIN',det:'DET',orl:'ORL',nyk:'NYK',atl:'ATL',bos:'BOS',mia:'MIA',mil:'MIL',sas:'SAS',por:'POR',lal:'LAL',lac:'LAC',gsw:'GSW',hou:'HOU',ind:'IND',cle:'CLE',chi:'CHI',tor:'TOR',phi:'PHI',mem:'MEM',nop:'NOP',sac:'SAC',dal:'DAL',uta:'UTA',was:'WAS',nyy:'NYY',nym:'NYM',lad:'LAD',laa:'LAA',chc:'CHC',cws:'CWS',stl:'STL',sd:'SD',sf:'SF',tex:'TEX',sea:'SEA',kc:'KC',oak:'OAK',bal:'BAL',tb:'TB',wsh:'WSH',col:'COL',ari:'ARI',pit:'PIT',cin:'CIN'};
  const title = mA.teams.length > 0
    ? mA.teams.map(t => ABBR[t] || t.toUpperCase()).join(' vs ')
    : mA.rawTitle;

  const lineStr = mA.line ? ` (${mA.marketType === 'spread' ? '±' : 'O/U '}${mA.line})` : '';
  return {
    id: mA.id + '||' + mB.id,
    title: title + lineStr,
    gameDate: mA.gameDate || mB.gameDate,
    sport: mA.sport,
    marketType: mA.marketType,
    legA: {
      platform: mA.platform, outcome: best.oA, price: best.pA, stake: stakeA,
      rawTitle: mA.rawTitle,
    },
    legB: {
      platform: mB.platform, outcome: best.oB, price: best.pB, stake: stakeB,
      rawTitle: mB.rawTitle,
    },
    impliedSum: best.sum * 100,
    margin, profit, roi, isArb, isNear,
  };
}

async function fetchRaw(url) {
  const bust = url + (url.includes('?') ? '&' : '?') + '_t=' + Date.now();
  const res  = await fetch(bust, { cache: 'no-store', signal: AbortSignal.timeout(30000) });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function fetchPolymarket() {
  const data = await fetchRaw('/api/polymarket');
  const markets = data.markets || (Array.isArray(data) ? data : []);
  return markets.map(m => extractPolymarketStructure(m)).filter(Boolean);
}

async function fetchKalshi() {
  const data = await fetchRaw('/api/kalshi');
  const now  = Date.now();
  const cut  = now + 48 * 60 * 60 * 1000;
  return (data.markets || [])
    .filter(m => {
      if (m.mve_collection_ticker) return false;
      if (m.market_type !== 'binary') return false;
      if (m.status !== 'active') return false;
      const end = m.expected_expiration_time;
      if (!end) return true;
      const endMs = new Date(end).getTime();
      return endMs > now && endMs <= cut;
    })
    .map(m => extractKalshiStructure(m))
    .filter(Boolean);
}


function extractNovigStructure(m) {
  const evt     = m.eventData || {};
  const game    = evt.game || {};
  const title   = m.description || evt.description || '';
  const mType   = m.type || '';

  // Sport from league
  const league = (evt.league || '').toUpperCase();
  let sport = 'other';
  if (league === 'NBA' || league === 'WNBA') sport = 'nba';
  else if (league === 'MLB') sport = 'mlb';
  else if (league === 'NFL') sport = 'nfl';
  else if (league === 'NHL') sport = 'nhl';

  // Market type
  let marketType = 'other';
  let statType   = null;
  if (mType === 'MONEY' || mType === 'MONEYLINE') marketType = 'moneyline';
  else if (mType === 'SPREAD') marketType = 'spread';
  else if (mType === 'TOTAL') marketType = 'total';
  else if (mType === 'POINTS') { marketType = 'prop'; statType = 'points'; }
  else if (mType === 'REBOUNDS') { marketType = 'prop'; statType = 'rebounds'; }
  else if (mType === 'ASSISTS') { marketType = 'prop'; statType = 'assists'; }
  else if (mType === 'THREE_POINTERS_MADE') { marketType = 'prop'; statType = 'threes'; }
  else if (mType === 'STEALS') { marketType = 'prop'; statType = 'steals'; }
  else if (mType === 'BLOCKS') { marketType = 'prop'; statType = 'blocks'; }
  else if (mType === 'PITCHER_STRIKEOUTS') { marketType = 'prop'; statType = 'strikeouts'; }
  else if (mType === 'HOME_RUNS') { marketType = 'prop'; statType = 'homeruns'; }
  else if (mType === 'HITS') { marketType = 'prop'; statType = 'hits'; }
  else return null;

  if (marketType === 'other') return null;

  // Reject live in-game events — Novig live prices don't match Polymarket pre-game prices
  if (evt.status === 'OPEN_INGAME') return null;

  // Game key — match Polymarket slug format: nba-away-home-date
  const awayAbbr = (game.awayTeam?.short_name || game.awayTeam?.name || '').toLowerCase().replace(/\s+/g, '');
  const homeAbbr = (game.homeTeam?.short_name || game.homeTeam?.name || '').toLowerCase().replace(/\s+/g, '');
  const dateStr  = (game.scheduled_start || evt.scheduled_start || '').slice(0, 10);
  const gameKey  = sport && awayAbbr && homeAbbr && dateStr
    ? `${sport}-${awayAbbr}-${homeAbbr}-${dateStr}` : null;

  if (!gameKey) return null;

  // Line
  const line = m.strike || null;

  // Player for props
  const player = m.player?.name ? m.player.name.toLowerCase() : null;

  // Prices — index 0 = YES/Over/Away, index 1 = NO/Under/Home
  const outcomes = m.outcomes || [];
  const out0 = outcomes.find(o => o.index === 0) || outcomes[0];
  const out1 = outcomes.find(o => o.index === 1) || outcomes[1];

  // Reject in-game events — live game prices are stale and create fake arbs
  // Only pregame markets have reliable prices
  if (evt.status === 'OPEN_INGAME') return null;

  // Only use live bid prices — reject stale 'last' prices
  const yesLiveBid = parseFloat(out0?.liveBid || 0);
  const noLiveBid  = parseFloat(out1?.liveBid || 0);

  // Require live bids on both sides
  if (!yesLiveBid || !noLiveBid) return null;

  const yesPrice = yesLiveBid;
  const noPrice  = noLiveBid;

  if (!yesPrice || yesPrice < 0.02 || yesPrice > 0.98) return null;
  if (!noPrice  || noPrice  < 0.02 || noPrice  > 0.98) return null;

  // Game date
  const gameDate = dateStr || null;

  // Teams from game
  const teams = [awayAbbr, homeAbbr].filter(Boolean);

  // Raw title for display
  const rawTitle = title;

  return {
    id: 'nv_' + m.id,
    platform: 'novig',
    rawTitle,
    sport, gameKey, teams, marketType, line,
    player, statType, gameDate,
    yesPrice, noPrice,
    // Novig is an exchange — no house fee, bid price IS executable price
    url: `https://app.novig.us`,
  };
}

async function fetchNovig() {
  const data = await fetchRaw('/api/novig');
  const events = data.events || [];
  const markets = [];
  events.forEach(evt => {
    (evt.markets || []).forEach(mkt => {
      markets.push({ ...mkt, eventData: evt });
    });
  });
  return markets.map(m => extractNovigStructure(m)).filter(Boolean);
}

const fmt    = (n, d=2) => (+n).toFixed(d);

function probToAmerican(p) {
  if (!p || p <= 0 || p >= 1) return '—';
  return p >= 0.5
    ? '-' + Math.round(p / (1 - p) * 100)
    : '+' + Math.round((1 - p) / p * 100);
}

function ArbCard({ opp }) {
  const { legA, legB, margin, roi, sport, marketType, title, isNear, impliedSum, gameDate } = opp;

  const [stakeB, setStakeB] = React.useState('');
  const [activeInput, setActiveInput] = React.useState(null);

  const denom = legA.price + legB.price;

  // When stake A changes, auto-calc stake B for optimal split
  function handleStakeA(val) {
    setStakeA(val);
    setActiveInput('a');
    const n = parseFloat(val);
    if (n > 0) setStakeB((n * legB.price / legA.price).toFixed(2));
    else setStakeB('');
  }

  function handleStakeB(val) {
    setStakeB(val);
    setActiveInput('b');
    const n = parseFloat(val);
    if (n > 0) setStakeA((n * legA.price / legB.price).toFixed(2));
    else setStakeA('');

  function setTotal(total) {
    const sA = (total * legA.price / denom).toFixed(2);
    const sB = (total * legB.price / denom).toFixed(2);
    setStakeA(sA);
    setStakeB(sB);
  }

  const numA = parseFloat(stakeA) || 0;
  const numB = parseFloat(stakeB) || 0;
  const totalStake = numA + numB;
  const retA = numA > 0 ? numA / legA.price : 0;  // total return if leg A wins
  const retB = numB > 0 ? numB / legB.price : 0;  // total return if leg B wins
  const profitIfA = numA > 0 ? retA - totalStake : 0;
  const profitIfB = numB > 0 ? retB - totalStake : 0;
  const isBalanced = numA > 0 && numB > 0 && Math.abs(profitIfA - profitIfB) < 0.10;

  const cls = isNear ? 'card near' : margin > 3 ? 'card strong' : margin > 1 ? 'card decent' : 'card thin';
  const mvCls = isNear ? 'mv-near' : margin > 3 ? 'mv-strong' : margin > 1 ? 'mv-decent' : 'mv-thin';

  return (

            <span className={profitIfA > 0 ? 'oj-scen-profit' : 'oj-scen-loss'}>
              {profitIfA >= 0 ? '+' : ''}{fmtUSD(profitIfA)}
            </span>
          </div>
          <div className="oj-scenario">
            <span className="oj-scen-lbl">If {PLAT_LB[legB.platform]} wins:</span>
            <span className={profitIfB > 0 ? 'oj-scen-profit' : 'oj-scen-loss'}>
              {profitIfB >= 0 ? '+' : ''}{fmtUSD(profitIfB)}
            </span>
          </div>
          {isBalanced && (
            <div className="oj-guaranteed">
              ✓ Guaranteed profit: <strong>{fmtUSD(Math.min(profitIfA, profitIfB))}</strong>
            </div>
          )}

            <div className="oj-unbalanced">Adjust stakes for equal profit on both sides</div>
          )}
        </div>
      )}
    </div>
  );
}

function humanOutcome(title, outcome) {
  const t = title || '';
  // Moneyline: "Thunder vs. Suns" YES → "Thunder wins"
  // Moneyline: "Thunder vs. Suns" NO  → "Suns wins"
  const vsM = t.match(/^(.+?)\s+vs\.?\s+(.+?)(\s*:.*)?$/i);
  if (vsM && !t.includes(':')) {
    const teamA = vsM[1].trim();
    const teamB = vsM[2].trim();
    return outcome === 'YES' ? `${teamA} wins` : `${teamB} wins`;
  }
  // Kalshi moneyline: "Game 3: Oklahoma City at Phoenix Winner?" NO → "Phoenix wins"
  const atM = t.match(/(.+?)\s+at\s+(.+?)\s+Winner/i);
  if (atM) {
    const away = atM[1].replace(/^Game\s+\d+:\s*/i, '').trim();
    const home = atM[2].trim();
    return outcome === 'YES' ? `${away} wins` : `${home} wins`;
  }
  // Spread: "Oklahoma City wins by over 9.5 points?" YES → "OKC covers 9.5" NO → "OKC does NOT cover"
  const spreadM = t.match(/^(.+?)\s+wins by over\s+([\d.]+)/i);
  if (spreadM) {
    const team = spreadM[1].trim();
    const line = spreadM[2];
    return outcome === 'YES' ? `${team} covers ${line}` : `${team} does NOT cover ${line}`;
  }
  // Polymarket spread: "Spread: Thunder (-9.5)" YES → "Thunder covers -9.5"
  const pmSpread = t.match(/Spread:\s+(.+?)\s+\(([-\d.]+)\)/i);
  if (pmSpread) {
    return outcome === 'YES' ? `${pmSpread[1]} covers ${pmSpread[2]}` : `${pmSpread[1]} does NOT cover`;
  }
  // Total: "Thunder vs. Suns: O/U 215.5" YES → "Over 215.5" NO → "Under 215.5"
  const ouM = t.match(/O\/U\s*([\d.]+)/i);
  if (ouM) {
    return outcome === 'YES' ? `Over ${ouM[1]}` : `Under ${ouM[1]}`;
  }
  // Kalshi total: "Total Points" YES → "Over the total" NO → "Under the total"
  if (/total points/i.test(t)) {
    return outcome === 'YES' ? 'Over the total' : 'Under the total';
  }
  // Prop: "Kevin Durant: 5+ assists" YES → "Durant gets 5+ assists" NO → "Durant gets fewer than 5"
  const propM = t.match(/^(.+?):\s*([\d.]+)\+\s*(.+)$/i);
  if (propM) {
    const lastName = propM[1].split(' ').pop();
    const num = propM[2];
    const stat = propM[3];
    return outcome === 'YES' ? `${lastName} gets ${num}+ ${stat}` : `${lastName} gets fewer than ${num} ${stat}`;
  }
  // Prop O/U: "Kevin Durant: Assists O/U 4.5" YES → "Durant over 4.5 assists"
  const propOuM = t.match(/^(.+?):\s*(.+?)\s+O\/U\s*([\d.]+)/i);
  if (propOuM) {
    const lastName = propOuM[1].split(' ').pop();
    const stat = propOuM[2];
    const num = propOuM[3];
    return outcome === 'YES' ? `${lastName} over ${num} ${stat}` : `${lastName} under ${num} ${stat}`;
  }
  return outcome === 'YES' ? 'Yes on this outcome' : 'No on this outcome';
}

    await Promise.all([
      fetchPolymarket().then(d => { mkts.polymarket = d; stat.polymarket = 'ok'; }).catch(e => { stat.polymarket = 'error'; errs.polymarket = e.message; }),
      fetchKalshi().then(d => { mkts.kalshi = d; stat.kalshi = 'ok'; }).catch(e => { stat.kalshi = 'error'; errs.kalshi = e.message; }),
      fetchNovig().then(d => { mkts.novig = d; stat.novig = 'ok'; }).catch(e => { stat.novig = 'error'; errs.novig = e.message; }),
    ]);

    setMarkets(mkts);
    setStatus(stat);
    setErrors(errs);

    // Match and calc arbs
    const allStructured = [...mkts.polymarket, ...mkts.kalshi, ...mkts.novig];
    const matched = matchMarkets(allStructured);
    setPairs(matched.length);

    const arbList = [], nearList = [];
    matched.forEach(([mA, mB]) => {
      const opp = calcArb(mA, mB);
      if (!opp) return;
      if (opp.isArb) arbList.push(opp);
      else if (opp.isNear) nearList.push(opp);
    });

    arbList.sort((a,b) => b.margin - a.margin);
    nearList.sort((a,b) => b.margin - a.margin);
    setArbs(arbList);
    setNear(nearList);
    setLastUp(new Date());
    setLoading(false);
    setFirst(false);
    setCdown(REFRESH_SECS);
  }, []);

  useEffect(() => { refresh(); }, []);
  useEffect(() => {
    const id = setInterval(() => {
      setCdown(c => { if (c <= 1) { refresh(); return REFRESH_SECS; } return c - 1; });
    }, 1000);
    return () => clearInterval(id);
  }, [refresh]);

  const fArbs = filter === 'all' ? arbs : arbs.filter(a => a.sport === filter);
  const fNear = filter === 'all' ? near : near.filter(a => a.sport === filter);
  const totalMkts = Object.values(markets).reduce((s,m) => s + m.length, 0);
  const bestM = arbs.length > 0 ? arbs[0].margin : null;

  return (
    <div>
      <div className="hdr">
        <div>
          <div className="hdr-title">LIVE ARB <span>SCANNER</span></div>
          <div className="hdr-sub">The +EV Cave · Prediction Market Arbitrage</div>
        </div>
        <div className="hdr-right">
          {lastUp && (
            <div style={{textAlign:'right'}}>
              <div className="timestamp">Updated {lastUp.toLocaleTimeString()}</div>
              <div className="countdown">next refresh in {countdown}s</div>
            </div>
          )}
          <button className="btn-refresh" onClick={refresh} disabled={loading}>
            {loading ? '↻ Refreshing…' : '↻ Refresh'}
          </button>
        </div>
      </div>

      <div className="platform-row">
        {Object.entries(status).map(([p,s]) => (
          <PlatBadge key={p} name={p} status={s} count={markets[p]?.length || 0} />
        ))}
      </div>

      {Object.entries(errors).map(([p,msg]) => (
        <div key={p} className="err-banner"><strong>{PLAT_LB[p]}:</strong> {msg}</div>
      ))}

      {!firstLoad && (
        <div className="stats-bar">
          <div className="stat">
            <div className="stat-val" style={{color: arbs.length > 0 ? 'var(--green)' : 'var(--dim)'}}>{arbs.length}</div>
            <div className="stat-lbl">Live Arbs</div>
          </div>
          <div className="stat">
            <div className="stat-val" style={{color: near.length > 0 ? 'var(--yellow)' : 'var(--dim)'}}>{near.length}</div>
            <div className="stat-lbl">Near-Arbs</div>
          </div>
          <div className="stat">
            <div className="stat-val" style={{color: bestM > 0 ? 'var(--green)' : 'var(--dim)'}}>{bestM != null ? fmtPct(bestM) : '—'}</div>
            <div className="stat-lbl">Best Margin</div>
          </div>
          <div className="stat">
            <div className="stat-val">{totalMkts.toLocaleString()}</div>
            <div className="stat-lbl">Markets Scanned</div>
          </div>
          <div className="stat">
            <div className="stat-val">{pairs.toLocaleString()}</div>
            <div className="stat-lbl">Pairs Matched</div>
          </div>
        </div>
      )}

      <div className="filters">
        {FILTERS.map(f => (
          <button key={f} className={`fbtn${filter===f?' active':''}`} onClick={() => setFilter(f)}>
            {FILTER_LB[f]}
          </button>
        ))}
        <div className="near-toggle" onClick={() => setShowNear(!showNear)}>
          <div className={`tswitch${showNear?' on':''}`}><div className="tknob"/></div>
          Show near-arbs
        </div>
      </div>

      {firstLoad && loading ? (
        <div className="cards">{[1,2,3].map(i=><div key={i} className="skel skel-card"/>)}</div>
      ) : (
        <>
          <div className="sec-hdr">
            Live Arbitrage Opportunities
            {fArbs.length > 0 && <span className="sec-count">{fArbs.length}</span>}
          </div>

          {fArbs.length > 0
            ? <div className="cards">{fArbs.map(o => <ArbCard key={o.id} opp={o} />)}</div>
            : <div className="empty">
                <div className="empty-icon">◎</div>
                <div>No arbitrage opportunities{filter !== 'all' ? ` in ${FILTER_LB[filter]}` : ''} right now.</div>
                <div style={{marginTop:6,fontSize:'0.7rem',color:'var(--dimmer)'}}>
                  {pairs} pairs matched across {totalMkts.toLocaleString()} markets · refreshes every {REFRESH_SECS}s
                </div>
              </div>
          }

          {showNear && (
            <div className="near-section">
              <button className="near-hdr-btn" onClick={() => setNearOpen(!nearOpen)}>
                <span className={`chev${nearOpen?' open':''}`}>▶</span>
                Near-arbs ({fNear.length}) — within 2% of profitable
              </button>
              {nearOpen && fNear.length > 0 && (
                <div className="cards">{fNear.map(o => <ArbCard key={o.id} opp={o} />)}</div>
              )}
              {nearOpen && fNear.length === 0 && (
                <div style={{padding:'16px 0',fontSize:'0.72rem',color:'var(--dimmer)'}}>No near-arbs found.</div>
              )}
            </div>
          )}
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
