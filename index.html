      --green: #00dc6e; --yellow: #f5c842; --red: #f54262;
      --border: rgba(255,255,255,0.07); --border-2: rgba(255,255,255,0.13);
      --text: #e8eaed; --dim: rgba(232,234,237,0.45); --dimmer: rgba(232,234,237,0.22);
      --mono: 'IBM Plex Mono', monospace; --sans: 'Syne', sans-serif;
    }
    html { font-size: 14px; }
    body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; }
    #root { max-width: 1120px; margin: 0 auto; padding: 28px 16px 80px; }

    .plat-badge { display: flex; align-items: center; gap: 7px; font-size: 0.7rem; padding: 4px 11px; border-radius: 4px; background: var(--surface-2); border: 1px solid var(--border); letter-spacing: 0.04em; }

    .chev { font-size: 0.62rem; transition: transform 0.2s; display: inline-block; }

};

function normalizeTeam(name) {
  if (!name) return null;
  const t = name.toLowerCase().trim();
  return TEAM_MAP[t] || t;
}

function teamsFromKalshiTicker(ticker) {
  // KXNBAGAME-26APR25DETORL-ORL  →  teams: [DET, ORL]
  // KXNBASPREAD-26APR25DETORL-ORL7 → same
  const parts = ticker.split('-');
  if (parts.length < 2) return [];
  const gamePart = parts[1]; // e.g. 26APR25DETORL
  // Strip the date prefix (digits + month + digits = 9 chars like 26APR25)
  const dateStripped = gamePart.replace(/^\d{2}[A-Z]{3}\d{2}/, '');
  // dateStripped = DETORL → split into 3-char codes
  const teams = [];
  for (let i = 0; i < dateStripped.length; i += 3) {
    const code = dateStripped.slice(i, i + 3);
    if (code.length === 3) teams.push(KALSHI_CODES[code] || code.toLowerCase());
  }
  return teams;
}

function dateFromKalshiTicker(ticker) {
  // 26APR25 → 2026-04-25
  const m = ticker.match(/(\d{2})([A-Z]{3})(\d{2})/);
  if (!m) return null;
  const months = {JAN:'01',FEB:'02',MAR:'03',APR:'04',MAY:'05',JUN:'06',
                  JUL:'07',AUG:'08',SEP:'09',OCT:'10',NOV:'11',DEC:'12'};
  return `20${m[1]}-${months[m[2]] || '01'}-${m[3].padStart(2,'0')}`;
}

function lineFromKalshiTicker(ticker) {
  // Last segment: ORL7 → 7, 228 → 228, OKC-3 → -3
  const parts = ticker.split('-');
  const last = parts[parts.length - 1];
  const m = last.match(/(-?\d+\.?\d*)$/);
  return m ? parseFloat(m[1]) : null;
}

function sportFromSeries(series) {
  if (/^KXNBA/.test(series) || /^KXWNBA/.test(series)) return 'nba';
  if (/^KXMLB/.test(series) || /^KXNRFI/.test(series)) return 'mlb';
  if (/^KXNFL/.test(series)) return 'nfl';
  if (/^KXNHL/.test(series)) return 'nhl';
  if (/KXBTC|KXETH|KXSOL/.test(series)) return 'crypto';
  return 'other';
}

function marketTypeFromSeries(series) {
  if (/GAME/.test(series)) return 'moneyline';
  if (/SPREAD/.test(series)) return 'spread';
  if (/TOTAL/.test(series)) return 'total';
  if (/PTS|POINTS/.test(series)) return 'prop';
  if (/REB/.test(series)) return 'prop';
  if (/AST/.test(series)) return 'prop';
  if (/3PT/.test(series)) return 'prop';
  if (/HIT|HR|RBI|PITCH/.test(series)) return 'prop';
  if (/NRFI/.test(series)) return 'prop';
  return 'other';
}

const NBA_TEAMS_RE = /\b(knicks|new york knicks|nets|brooklyn|celtics|boston|lakers|clippers|warriors|golden state|bucks|milwaukee|heat|miami|bulls|chicago|sixers|76ers|raptors|toronto|hawks|atlanta|hornets|charlotte|pistons|detroit|cavaliers|cleveland|pacers|indiana|magic|orlando|wizards|washington|spurs|san antonio|thunder|oklahoma city|nuggets|denver|jazz|utah|suns|phoenix|blazers|portland|timberwolves|wolves|minnesota|grizzlies|memphis|pelicans|new orleans|rockets|houston|mavericks|dallas|kings|sacramento)\b/gi;
const MLB_TEAMS_RE = /\b(yankees|mets|red sox|dodgers|angels|cubs|white sox|astros|braves|cardinals|phillies|padres|giants|rangers|mariners|brewers|twins|tigers|guardians|royals|athletics|orioles|rays|blue jays|nationals|marlins|rockies|diamondbacks|pirates|reds)\b/gi;
const NFL_TEAMS_RE = /\b(chiefs|eagles|cowboys|packers|patriots|bills|ravens|49ers|niners|steelers|seahawks|rams|broncos|chargers|raiders|bears|vikings|lions|falcons|saints|buccaneers|panthers|commanders|jets|bengals|browns|texans|jaguars|titans|colts|dolphins)\b/gi;

function extractPolymarketStructure(m) {
  const title = m.question || m.title || '';
  const t = title.toLowerCase();

  // Determine sport
  let sport = 'other';
  const nbaM = t.match(NBA_TEAMS_RE);
  const mlbM = t.match(MLB_TEAMS_RE);
  const nflM = t.match(NFL_TEAMS_RE);
  if (/\b(nba|basketball|eastern conf|western conf|pro basketball)\b/.test(t) || nbaM) sport = 'nba';
  else if (/\b(mlb|baseball|world series|home run|strikeout|pitcher|nrfi|rbi|innings)\b/.test(t) || mlbM) sport = 'mlb';
  else if (/\b(nfl|football|touchdown|quarterback|super bowl|nfc|afc)\b/.test(t) || nflM) sport = 'nfl';
  else if (/\b(nhl|hockey|puck|goal)\b/.test(t)) sport = 'nhl';
  else if (/\b(bitcoin|btc|ethereum|eth|crypto|solana)\b/.test(t)) sport = 'crypto';

  // Extract teams
  const teamMatches = t.match(NBA_TEAMS_RE) || t.match(MLB_TEAMS_RE) || t.match(NFL_TEAMS_RE) || [];
  const teams = [...new Set(teamMatches.map(normalizeTeam).filter(Boolean))];

  // Market type
  let marketType = 'other';
  if (/\b(spread|cover|wins by over|wins by under|points)\b/.test(t) && !/total|over\/under/.test(t)) marketType = 'spread';
  else if (/\b(total points|over\/under|over \d|under \d|points scored)\b/.test(t)) marketType = 'total';
  else if (/\b(win|winner|moneyline)\b/.test(t) && teams.length > 0) marketType = 'moneyline';

  // Line value
  const lineM = title.match(/[-+]?\d+\.?\d*\s*(?:points?|pts?|\+|-)/i) || title.match(/\b(\d+\.?\d*)\b/g);
  let line = null;
  if (marketType === 'spread' || marketType === 'total') {
    const nums = (title.match(/\b\d+\.?\d*\b/g) || []).map(Number).filter(n => n > 1 && n < 300);
    line = nums.length > 0 ? Math.max(...nums) : null;
  }

  // Game date from endDateIso
  const endDate = m.endDateIso || m.endDate;
  const gameDate = endDate ? endDate.slice(0, 10) : null;

  // Prices
  const prices = m.outcomePrices
    ? (Array.isArray(m.outcomePrices) ? m.outcomePrices : JSON.parse(m.outcomePrices || '[]'))
    : [];
  const yesPrice = parseFloat(prices[0] || 0);
  const noPrice  = parseFloat(prices[1] || 0);
  if (!yesPrice || yesPrice < 0.02 || yesPrice > 0.98) return null;

  return {
    id: 'pm_' + (m.id || m.conditionId || Math.random()),
    platform: 'polymarket',
    rawTitle: title,
    sport, teams, marketType, line, gameDate,
    yesPrice, noPrice: noPrice || (1 - yesPrice),
    url: m.slug ? `https://polymarket.com/event/${m.slug}` : 'https://polymarket.com',
  };
}

// ─── KALSHI EXTRACTION ────────────────────────────────────────────────────────
function extractKalshiStructure(m) {
  const ticker  = m.ticker || '';
  const seriesM = ticker.match(/^(KX[A-Z0-9]+?)-/);
  const series  = seriesM ? seriesM[1] : '';
  const sport   = sportFromSeries(series);

  // Detect futures ticker format: KXNBA-26-OKC (no date in middle)
  const isFutures = /^KX(NBA|MLB|NFL|NHL|WNBA)-\d{2}-/.test(ticker);

  let marketType, teams, line, gameDate;

  if (isFutures) {
    marketType = 'championship';
    // Extract team code from end: KXNBA-26-OKC → OKC
    const teamCode = ticker.split('-').pop();
    const teamName = KALSHI_CODES[teamCode] || teamCode.toLowerCase();
    teams = [teamName];
    line = null;
    gameDate = null; // Don't use date for futures matching
  } else {
    marketType = marketTypeFromSeries(series);
    teams = teamsFromKalshiTicker(ticker);
    line  = (marketType === 'spread' || marketType === 'total') ? lineFromKalshiTicker(ticker) : null;
    gameDate = dateFromKalshiTicker(ticker);
  }

  const yAsk = parseFloat(m.yes_ask_dollars) || 0;
  const yBid = parseFloat(m.yes_bid_dollars) || 0;
  const nAsk = parseFloat(m.no_ask_dollars)  || 0;
  const nBid = parseFloat(m.no_bid_dollars)  || 0;

  const yesPrice = yAsk > 0 ? yAsk : yBid;
  const noPrice  = nAsk > 0 ? nAsk : nBid;
  if (!yesPrice || yesPrice < 0.02 || yesPrice > 0.98) return null;

  return {
    id: 'ka_' + ticker,
    platform: 'kalshi',
    rawTitle: m.title || ticker,
    sport, teams, marketType, line, gameDate, isFutures,
    yesPrice, noPrice: noPrice || (1 - yesPrice),
    url: `https://kalshi.com/markets/${ticker}`,
  };
}

// ─── MATCHING ENGINE ──────────────────────────────────────────────────────────
function expandTeam(t) {
  // Expand short abbreviation to full name if possible
  return PM_ABBR[t] || KALSHI_CODES[t.toUpperCase()] || t;
}

function teamsOverlap(a, b) {
  if (!a.length || !b.length) return false;
  const expandedA = a.map(expandTeam);
  const expandedB = b.map(expandTeam);
  return expandedA.some(t => expandedB.includes(t)) ||
         a.some(t => b.includes(t));
}

function matchMarkets(structured) {
  const platforms = [...new Set(structured.map(m => m.platform))];
  if (platforms.length < 2) return [];

  const byPlatform = {};
  platforms.forEach(p => { byPlatform[p] = structured.filter(m => m.platform === p); });

  const pairs = [];
  const seen  = new Set();

  for (let i = 0; i < platforms.length; i++) {
    for (let j = i + 1; j < platforms.length; j++) {
      const pA = platforms[i], pB = platforms[j];
      byPlatform[pA].forEach(mA => {
        byPlatform[pB].forEach(mB => {
          // Must match: sport + marketType
          if (mA.sport !== mB.sport) return;
          if (mA.sport === 'other') return; // skip unclassified
          if (mA.marketType !== mB.marketType) return;
          if (mA.marketType === 'other') return;

          // Must share at least one team
          if (mA.teams.length > 0 && mB.teams.length > 0 && !teamsOverlap(mA.teams, mB.teams)) return;

          // For futures/championship markets, skip date check (Kalshi/PM expire ~same month)
          const bothFutures = mA.marketType === 'championship' && mB.marketType === 'championship';
          if (!bothFutures && mA.gameDate && mB.gameDate && mA.gameDate !== mB.gameDate) return;

          // For spread/total, line must be within 1 point
          if (mA.marketType === 'spread' || mA.marketType === 'total') {
            if (mA.line !== null && mB.line !== null && Math.abs(mA.line - mB.line) > 1) return;
          }

          const key = [mA.id, mB.id].sort().join('||');
          if (seen.has(key)) return;
          seen.add(key);
          pairs.push([mA, mB]);
        });
      });
    }
  }
  return pairs;
}

// ─── ARB CALCULATION ──────────────────────────────────────────────────────────
const NEAR_ARB_BAND = 0.02;

function calcArb(mA, mB) {
  const combos = [
    { oA:'YES', oB:'NO',  pA: mA.yesPrice, pB: mB.noPrice  },
    { oA:'NO',  oB:'YES', pA: mA.noPrice,  pB: mB.yesPrice },
  ];
  let best = null;
  combos.forEach(c => {
    if (!c.pA || !c.pB) return;
    const sum = c.pA + c.pB;
    if (!best || sum < best.sum) best = { ...c, sum };
  });
  if (!best) return null;

  // Sanity: sum must be between 0.82 and 1.18 to be a real same-market pair
  if (best.sum < 0.82 || best.sum > 1.18) return null;
  // Both legs must have liquidity
  if (best.pA < 0.04 || best.pB < 0.04) return null;

  const margin = (1 - best.sum) * 100;
  const isArb  = margin > 0;
  const isNear = !isArb && margin > -(NEAR_ARB_BAND * 100);
  if (!isArb && !isNear) return null;

  const denom  = best.pA + best.pB;
  const stakeA = BASE_STAKE * best.pA / denom;
  const stakeB = BASE_STAKE * best.pB / denom;
  const profit = isArb ? BASE_STAKE * (1 / denom - 1) : 0;
  const roi    = isArb ? (1 / denom - 1) * 100 : 0;

  // Build display title
  const title = mA.teams.length > 0
    ? mA.teams.map(t => t.charAt(0).toUpperCase() + t.slice(1)).join(' vs ')
    : mA.rawTitle;

  return {
    id: mA.id + '||' + mB.id,
    title: title + (mA.line ? ` (${mA.marketType === 'spread' ? '±' : 'O/U '}${mA.line})` : ''),
    sport: mA.sport,
    marketType: mA.marketType,
    legA: { platform: mA.platform, outcome: best.oA, price: best.pA, stake: stakeA },
    legB: { platform: mB.platform, outcome: best.oB, price: best.pB, stake: stakeB },
    impliedSum: best.sum * 100,
    margin, profit, roi, isArb, isNear,
  };
}

// ─── FETCHERS ─────────────────────────────────────────────────────────────────
async function fetchRaw(url) {
  const bust = url + (url.includes('?') ? '&' : '?') + '_t=' + Date.now();
  const res  = await fetch(bust, { cache: 'no-store', signal: AbortSignal.timeout(30000) });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function fetchPolymarket() {
  const data = await fetchRaw('/api/polymarket');
  const markets = data.markets || (Array.isArray(data) ? data : []);
  return markets.map(m => extractPolymarketStructure(m)).filter(Boolean);
}

async function fetchKalshi() {
  const data = await fetchRaw('/api/kalshi');
  const now  = Date.now();
  const cut  = now + 48 * 60 * 60 * 1000;
  return (data.markets || [])
    .filter(m => {
      if (m.mve_collection_ticker) return false;
      if (m.market_type !== 'binary') return false;
      if (m.status !== 'active') return false;
      const end = m.expected_expiration_time;
      if (!end) return true;
      const endMs = new Date(end).getTime();
      return endMs > now && endMs <= cut;
    })
    .map(m => extractKalshiStructure(m))
    .filter(Boolean);
}

async function fetchNovig() {
  const data = await fetchRaw('/api/novig');
  return []; // normalizer TBD when credentials arrive
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const fmt    = (n, d=2) => (+n).toFixed(d);
const fmtUSD = n => '$' + fmt(n, 2);
const fmtPct = n => fmt(n, 2) + '%';

function probToAmerican(p) {
  if (!p || p <= 0 || p >= 1) return '—';
  return p >= 0.5
    ? '-' + Math.round(p / (1 - p) * 100)
    : '+' + Math.round((1 - p) / p * 100);
}

// ─── COMPONENTS ───────────────────────────────────────────────────────────────
function PlatBadge({ name, status, count }) {
  const dot = status === 'ok' ? 'dot-ok' : status === 'error' ? 'dot-err' : status === 'loading' ? 'dot-load' : 'dot-idle';
  return (
    <div className="plat-badge">
      <div className={`dot ${dot}`} />
      <span className="plat-name">{PLAT_LB[name]}</span>
      {status === 'ok'      && <span className="plat-count">{count} mkts</span>}
      {status === 'error'   && <span className="plat-err">error</span>}
      {status === 'loading' && <span className="plat-load">loading…</span>}
    </div>
  );
}

function OJLeg({ leg, stake }) {
  const cls  = PLAT_CLS[leg.platform] || '';
  const amer = probToAmerican(leg.price);
  const ret  = stake / leg.price;
  return (
    <div className="oj-leg">
      <div className={`oj-plat ${cls}`}>{PLAT_LB[leg.platform]}</div>
      <div className="oj-outcome">Bet <strong>{leg.outcome}</strong></div>
      <div className="oj-odds">
        <span className="oj-american">{amer}</span>
        <span className="oj-cents">{fmt(leg.price * 100, 1)}¢</span>
      </div>
      <div className="oj-stake-line">
        <span className="oj-stake-val">{fmtUSD(stake)}</span>
        <span className="oj-stake-lbl"> to win {fmtUSD(ret)}</span>
      </div>
    </div>
  );
}

function ArbCard({ opp }) {
  const { legA, legB, margin, roi, sport, marketType, title, isNear, impliedSum } = opp;
  const [totalStake, setTotalStake] = useState('100');
  const ts     = Math.max(parseFloat(totalStake) || 100, 1);
  const denom  = legA.price + legB.price;
  const stakeA = ts * legA.price / denom;
  const stakeB = ts * legB.price / denom;
  const profit = isNear ? 0 : ts * (1 / denom - 1);

  const cls = isNear ? 'card near' : margin > 3 ? 'card strong' : margin > 1 ? 'card decent' : 'card thin';
  const mvCls = isNear ? 'mv-near' : margin > 3 ? 'mv-strong' : margin > 1 ? 'mv-decent' : 'mv-thin';

  return (
    <div className={cls}>
      <div className="card-top">
        <div className="card-tags">
          <span className="cat-tag">{sport.toUpperCase()}</span>
          <span className="type-tag">{marketType.toUpperCase()}</span>
          {!isNear && <span className="roi-tag">ROI {fmtPct(roi)}</span>}
        </div>
        <div className="margin-grp">
          <span className={`margin-val ${mvCls}`}>{fmtPct(margin)}</span>
          {isNear && <span className="near-lbl">near arb</span>}
        </div>
      </div>

      <div className="card-title">{title}</div>

      <div className="oj-legs">
        <OJLeg leg={legA} stake={stakeA} />
        <div className="oj-vs">VS</div>
        <OJLeg leg={legB} stake={stakeB} />
      </div>

      <div className="oj-calc" onClick={e => e.stopPropagation()}>
        <div className="oj-calc-left">
          <span className="oj-calc-lbl">Total stake</span>
          <div className="stake-input-wrap">
            <span className="stake-dollar">$</span>
            <input className="stake-input" type="number" min="1" value={totalStake} onChange={e => setTotalStake(e.target.value)} />
          </div>
          <div className="oj-pills">
            {[50,100,250,500,1000].map(v => (
              <button key={v} className="stake-pill" onClick={() => setTotalStake(String(v))}>${v}</button>
            ))}
          </div>
        </div>
        <div className="oj-calc-right">
          {isNear
            ? <div className="oj-not-yet">Not yet profitable — watch this</div>
            : <>
                <div className="oj-profit-val">+{fmtUSD(profit)}</div>
                <div className="oj-profit-lbl">guaranteed profit</div>
                <div className="oj-return-lbl">implied sum {fmtPct(impliedSum)}</div>
              </>
          }
        </div>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [markets,  setMarkets]  = useState({ polymarket:[], kalshi:[], novig:[] });
  const [status,   setStatus]   = useState({ polymarket:'idle', kalshi:'idle', novig:'idle' });
  const [errors,   setErrors]   = useState({});
  const [arbs,     setArbs]     = useState([]);
  const [near,     setNear]     = useState([]);
  const [pairs,    setPairs]    = useState(0);
  const [loading,  setLoading]  = useState(false);
  const [lastUp,   setLastUp]   = useState(null);
  const [countdown,setCdown]    = useState(REFRESH_SECS);
  const [filter,   setFilter]   = useState('all');
  const [showNear, setShowNear] = useState(true);
  const [nearOpen, setNearOpen] = useState(true);
  const [firstLoad,setFirst]    = useState(true);

  const refresh = useCallback(async () => {
    setLoading(true);
    setStatus({ polymarket:'loading', kalshi:'loading', novig:'loading' });

    const mkts = { polymarket:[], kalshi:[], novig:[] };
    const stat = { polymarket:'idle', kalshi:'idle', novig:'idle' };
    const errs = {};

    await Promise.all([
      fetchPolymarket().then(d => { mkts.polymarket = d; stat.polymarket = 'ok'; }).catch(e => { stat.polymarket = 'error'; errs.polymarket = e.message; }),
      fetchKalshi().then(d => { mkts.kalshi = d; stat.kalshi = 'ok'; }).catch(e => { stat.kalshi = 'error'; errs.kalshi = e.message; }),
      fetchNovig().then(d => { mkts.novig = d; stat.novig = 'ok'; }).catch(e => { stat.novig = 'error'; errs.novig = e.message; }),
    ]);

    setMarkets(mkts);
    setStatus(stat);
    setErrors(errs);

    // Match and calc arbs
    const allStructured = [...mkts.polymarket, ...mkts.kalshi, ...mkts.novig];
    const matched = matchMarkets(allStructured);
    setPairs(matched.length);

    const arbList = [], nearList = [];
    matched.forEach(([mA, mB]) => {
      const opp = calcArb(mA, mB);
      if (!opp) return;
      if (opp.isArb) arbList.push(opp);
      else if (opp.isNear) nearList.push(opp);
    });

    arbList.sort((a,b) => b.margin - a.margin);
    nearList.sort((a,b) => b.margin - a.margin);
    setArbs(arbList);
    setNear(nearList);
    setLastUp(new Date());
    setLoading(false);
    setFirst(false);
    setCdown(REFRESH_SECS);
  }, []);

  useEffect(() => { refresh(); }, []);
  useEffect(() => {
    const id = setInterval(() => {
      setCdown(c => { if (c <= 1) { refresh(); return REFRESH_SECS; } return c - 1; });
    }, 1000);
    return () => clearInterval(id);
  }, [refresh]);

  const fArbs = filter === 'all' ? arbs : arbs.filter(a => a.sport === filter);
  const fNear = filter === 'all' ? near : near.filter(a => a.sport === filter);
  const totalMkts = Object.values(markets).reduce((s,m) => s + m.length, 0);
  const bestM = arbs.length > 0 ? arbs[0].margin : null;

  return (
    <div>
      <div className="hdr">
        <div>
          <div className="hdr-title">LIVE ARB <span>SCANNER</span></div>
          <div className="hdr-sub">The +EV Cave · Prediction Market Arbitrage</div>
        </div>
        <div className="hdr-right">
          {lastUp && (
            <div style={{textAlign:'right'}}>
              <div className="timestamp">Updated {lastUp.toLocaleTimeString()}</div>
              <div className="countdown">next refresh in {countdown}s</div>
            </div>
          )}
          <button className="btn-refresh" onClick={refresh} disabled={loading}>
            {loading ? '↻ Refreshing…' : '↻ Refresh'}
          </button>
        </div>
      </div>

      <div className="platform-row">
        {Object.entries(status).map(([p,s]) => (
          <PlatBadge key={p} name={p} status={s} count={markets[p]?.length || 0} />
        ))}
      </div>

      {Object.entries(errors).map(([p,msg]) => (
        <div key={p} className="err-banner"><strong>{PLAT_LB[p]}:</strong> {msg}</div>
      ))}

      {!firstLoad && (
        <div className="stats-bar">
          <div className="stat">
            <div className="stat-val" style={{color: arbs.length > 0 ? 'var(--green)' : 'var(--dim)'}}>{arbs.length}</div>
            <div className="stat-lbl">Live Arbs</div>
          </div>
          <div className="stat">
            <div className="stat-val" style={{color: near.length > 0 ? 'var(--yellow)' : 'var(--dim)'}}>{near.length}</div>
            <div className="stat-lbl">Near-Arbs</div>
          </div>
          <div className="stat">
            <div className="stat-val" style={{color: bestM > 0 ? 'var(--green)' : 'var(--dim)'}}>{bestM != null ? fmtPct(bestM) : '—'}</div>
            <div className="stat-lbl">Best Margin</div>
          </div>
          <div className="stat">
            <div className="stat-val">{totalMkts.toLocaleString()}</div>
            <div className="stat-lbl">Markets Scanned</div>
          </div>
          <div className="stat">
            <div className="stat-val">{pairs.toLocaleString()}</div>
            <div className="stat-lbl">Pairs Matched</div>
          </div>
        </div>
      )}

      <div className="filters">
        {FILTERS.map(f => (
          <button key={f} className={`fbtn${filter===f?' active':''}`} onClick={() => setFilter(f)}>
            {FILTER_LB[f]}
          </button>
        ))}
        <div className="near-toggle" onClick={() => setShowNear(!showNear)}>
          <div className={`tswitch${showNear?' on':''}`}><div className="tknob"/></div>
          Show near-arbs
        </div>
      </div>

      {firstLoad && loading ? (
        <div className="cards">{[1,2,3].map(i=><div key={i} className="skel skel-card"/>)}</div>
      ) : (
        <>
          <div className="sec-hdr">
            Live Arbitrage Opportunities
            {fArbs.length > 0 && <span className="sec-count">{fArbs.length}</span>}
          </div>

          {fArbs.length > 0
            ? <div className="cards">{fArbs.map(o => <ArbCard key={o.id} opp={o} />)}</div>
            : <div className="empty">
                <div className="empty-icon">◎</div>
                <div>No arbitrage opportunities{filter !== 'all' ? ` in ${FILTER_LB[filter]}` : ''} right now.</div>
                <div style={{marginTop:6,fontSize:'0.7rem',color:'var(--dimmer)'}}>
                  {pairs} pairs matched across {totalMkts.toLocaleString()} markets · refreshes every {REFRESH_SECS}s
                </div>
              </div>
          }

          {showNear && (
            <div className="near-section">
              <button className="near-hdr-btn" onClick={() => setNearOpen(!nearOpen)}>
                <span className={`chev${nearOpen?' open':''}`}>▶</span>
                Near-arbs ({fNear.length}) — within 2% of profitable
              </button>
              {nearOpen && fNear.length > 0 && (
                <div className="cards">{fNear.map(o => <ArbCard key={o.id} opp={o} />)}</div>
              )}
              {nearOpen && fNear.length === 0 && (
                <div style={{padding:'16px 0',fontSize:'0.72rem',color:'var(--dimmer)'}}>No near-arbs found.</div>
              )}
            </div>
          )}
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
